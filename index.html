<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hola Universo - Luna</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
      color: #e6e7ea;
      font-family: system-ui, sans-serif;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    .moon {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #f6f1d5, #e3d5a5);
      box-shadow: 0 0 60px rgba(247, 241, 229, 0.6);
      position: relative;
    }
    .crater {
      position: absolute;
      border-radius: 50%;
      background: rgba(180, 160, 110, 0.4);
    }
  </style>
</head>
<body>
  <h1>🌌 Hola Universo</h1>
  <div class="moon">
    <div class="crater" style="width:40px;height:40px;top:30px;left:50px;"></div>
    <div class="crater" style="width:25px;height:25px;top:100px;left:90px;"></div>
    <div class="crater" style="width:15px;height:15px;top:60px;left:120px;"></div>
  </div>
  <p style="margin-top:2rem;opacity:0.7;">Página de prueba creada por Bizarro</p>
  <p style="margin-top:1rem;opacity:0.9;font-weight:bold;">✅ Verificado por Bizarro</p>
</body>
</html>
